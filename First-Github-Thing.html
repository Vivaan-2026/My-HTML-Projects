<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A well read document(maybe well written too)</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f0f4ff;
      }

      .moving-button {
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        background: #0078d4;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: top 0.18s ease, left 0.18s ease;
      }

      #trail {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .trail-dot {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(1);
        animation: fadeTrail 0.9s ease-out forwards;
      }

      .bouncing-arrow {
        position: absolute;
        left: 20%;
        top: 20%;
        width: 52px;
        height: 52px;
        pointer-events: none;
        transform: translate(-50%, -50%) rotate(0deg);
        transform-origin: center center;
        display: grid;
        place-items: center;
      }

      .arrow-shaft {
        position: absolute;
        width: 8px;
        height: 40px;
        background: #d9d9d9;
        border: 2px solid #7f7f7f;
        box-shadow: inset 0 0 0 2px #c2c2c2;
      }

      .arrow-head {
        position: absolute;
        width: 16px;
        height: 16px;
        background: #666;
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        left: 50%;
        top: 8px;
        transform: translateX(-50%);
        border: 2px solid #3f3f3f;
      }

      .arrow-feather {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #d9d9d9;
        border: 2px solid #7f7f7f;
      }

      .arrow-feather:nth-child(3) {
        left: 8px;
        top: 28px;
      }
      .arrow-feather:nth-child(4) {
        left: 20px;
        top: 32px;
      }
      .arrow-feather:nth-child(5) {
        left: 32px;
        top: 28px;
      }

      @keyframes fadeTrail {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(2.2);
        }
      }

      .container {
        text-align: center;
        gap: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="moving-button" id="dodger">Click me</button>
    </div>
    <div id="trail"></div>
    <div class="bouncing-arrow" id="bouncingArrow">
      <div class="arrow-shaft"></div>
      <div class="arrow-head"></div>
      <div class="arrow-feather"></div>
      <div class="arrow-feather"></div>
      <div class="arrow-feather"></div>
    </div>
    <script>
      const button = document.getElementById('dodger');
      const trail = document.getElementById('trail');
      const arrow = document.getElementById('bouncingArrow');
      const threshold = 140;
      const padding = 20;
      const arrowAvoidThreshold = 110;
      const arrowSpeed = 4;
      let arrowX = window.innerWidth * 0.32;
      let arrowY = window.innerHeight * 0.24;
      let arrowVX = arrowSpeed * (Math.random() > 0.5 ? 1 : -1);
      let arrowVY = arrowSpeed * (Math.random() > 0.5 ? 1 : -1);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function addTrailDot(x, y) {
        const dot = document.createElement('span');
        dot.className = 'trail-dot';
        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
        dot.style.background = `hsl(${Math.random() * 360}, 100%, 68%)`;
        trail.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove());
      }

      function updateArrowPosition() {
        arrowX += arrowVX;
        arrowY += arrowVY;

        if (arrowX < padding + 24 || arrowX > window.innerWidth - padding - 24) {
          arrowVX *= -1;
          arrowX = clamp(arrowX, padding + 24, window.innerWidth - padding - 24);
        }
        if (arrowY < padding + 24 || arrowY > window.innerHeight - padding - 24) {
          arrowVY *= -1;
          arrowY = clamp(arrowY, padding + 24, window.innerHeight - padding - 24);
        }

        arrow.style.left = `${arrowX}px`;
        arrow.style.top = `${arrowY}px`;
        const direction = Math.atan2(arrowVY, arrowVX);
        arrow.style.transform = `translate(-50%, -50%) rotate(${direction}rad)`;
        window.requestAnimationFrame(updateArrowPosition);
      }

      function repelArrowFromCursor(mouseX, mouseY) {
        const dx = arrowX - mouseX;
        const dy = arrowY - mouseY;
        const distance = Math.hypot(dx, dy);

        if (distance < arrowAvoidThreshold) {
          const angle = Math.atan2(dy, dx);
          arrowVX = Math.cos(angle) * arrowSpeed * 1.8;
          arrowVY = Math.sin(angle) * arrowSpeed * 1.8;
        }
      }

      function moveButtonAway(event) {
        const rect = button.getBoundingClientRect();
        const mouseX = event.clientX;
        const mouseY = event.clientY;
        const btnCenterX = rect.left + rect.width / 2;
        const btnCenterY = rect.top + rect.height / 2;
        const dx = btnCenterX - mouseX;
        const dy = btnCenterY - mouseY;
        const distance = Math.hypot(dx, dy);

        const arrowDx = btnCenterX - arrowX;
        const arrowDy = btnCenterY - arrowY;
        const arrowDistance = Math.hypot(arrowDx, arrowDy);

        let moved = false;

        if (distance < threshold) {
          const angle = Math.atan2(dy, dx);
          const moveDistance = threshold - distance + 20;
          const newLeft = clamp(
            btnCenterX + Math.cos(angle) * moveDistance - rect.width / 2,
            padding,
            window.innerWidth - rect.width - padding
          );
          const newTop = clamp(
            btnCenterY + Math.sin(angle) * moveDistance - rect.height / 2,
            padding,
            window.innerHeight - rect.height - padding
          );

          button.style.left = `${newLeft}px`;
          button.style.top = `${newTop}px`;
          button.style.transform = 'translate(0, 0)';
          moved = true;
        }

        if (arrowDistance < arrowAvoidThreshold) {
          const arrowAngle = Math.atan2(arrowDy, arrowDx);
          const moveDistance = arrowAvoidThreshold - arrowDistance + 16;
          const newLeft = clamp(
            btnCenterX + Math.cos(arrowAngle) * moveDistance - rect.width / 2,
            padding,
            window.innerWidth - rect.width - padding
          );
          const newTop = clamp(
            btnCenterY + Math.sin(arrowAngle) * moveDistance - rect.height / 2,
            padding,
            window.innerHeight - rect.height - padding
          );

          button.style.left = `${newLeft}px`;
          button.style.top = `${newTop}px`;
          button.style.transform = 'translate(0, 0)';
          moved = true;
        }

        if (moved) {
          addTrailDot(btnCenterX, btnCenterY);
        }
      }

      window.addEventListener('mousemove', (event) => {
        repelArrowFromCursor(event.clientX, event.clientY);
        moveButtonAway(event);
      });

      updateArrowPosition();
    </script>
  </body>
</html>
