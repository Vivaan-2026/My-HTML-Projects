<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A well read document(maybe well written too)</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f0f4ff;
      }

      .page {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 220px;
        background: #1f2937;
        color: #f8fafc;
        padding: 20px 0;
        box-shadow: 2px 0 18px rgba(15, 23, 42, 0.16);
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.4rem;
        padding: 0 18px;
      }

      .sidebar p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 16px 0 24px;
        padding: 0 18px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
      }

      .sidebar nav button {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #334155;
        color: #cbd5e1;
        text-align: left;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .sidebar nav button:hover,
      .sidebar nav button:focus {
        background: #475569;
        color: #ffffff;
        outline: none;
      }

      .content {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .content h1 {
        margin: 0;
        font-size: 2rem;
        color: #1f2937;
      }

      .content p {
        max-width: 720px;
        margin: 16px 0 0;
        line-height: 1.7;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <h2>Sidebar</h2>
        <p>Use these safe controls to navigate the page.</p>
        <nav>
          <button type="button">Home</button>
          <button type="button">About</button>
        </nav>
      </aside>
      <main class="content">
        <h1>Welcome back</h1>
        <p>This page has been cleaned and restored. The sidebar is intact, and the markup now validates properly.</p>
      </main>
    </div>
  </body>
</html>
