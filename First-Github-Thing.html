<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A well read document(maybe well written too)</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        cursor: default;
      }

      .page {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 220px;
        background: #1f2937;
        color: #f8fafc;
        padding: 20px 0;
        box-shadow: 2px 0 18px rgba(15, 23, 42, 0.16);
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.4rem;
        padding: 0 18px;
      }

      .sidebar p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 16px 0 24px;
        padding: 0 18px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
      }

      .sidebar nav button {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #334155;
        color: #cbd5e1;
        text-align: left;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .sidebar nav button:hover,
      .sidebar nav button:focus {
        background: #475569;
        color: #ffffff;
        outline: none;
      }

      .content {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      .content h1 {
        margin: 0;
        font-size: 2rem;
        color: #1f2937;
      }

      .content p {
        max-width: 720px;
        margin: 16px 0 0;
        line-height: 1.7;
        color: #334155;
      }

      .moving-button {
        position: fixed;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        background: #0078d4;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: left 0.16s ease, top 0.16s ease;
        will-change: left, top;
        z-index: 150;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.72);
        z-index: 1000;
        padding: 20px;
      }

      .modal.active {
        display: flex;
      }

      .dialog {
        position: relative;
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 22px;
        background: #ffffff;
        color: #102a43;
        box-shadow: 0 24px 60px rgba(12, 29, 56, 0.18);
      }

      .dialog h2 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 1.7rem;
      }

      .dialog p {
        margin: 0;
        line-height: 1.6;
        color: #334155;
      }

      .close-button {
        position: absolute;
        top: 18px;
        right: 18px;
        padding: 10px 16px;
        border: none;
        border-radius: 999px;
        background: #ef4444;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, top 0.15s ease, left 0.15s ease;
      }

      .close-button:hover {
        background: #dc2626;
      }

      .black-hole {
        position: fixed;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle, #111 0%, #000 45%, rgba(0,0,0,0.95) 70%, transparent 100%);
        box-shadow: 0 0 48px rgba(0,0,0,0.65), inset 0 0 18px rgba(255,255,255,0.08);
        pointer-events: none;
        z-index: 80;
      }

      .fake-cursor {
        position: fixed;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #000000;
        border: 2px solid #ffffff;
        box-shadow: 0 0 8px rgba(0,0,0,0.4);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 2000;
      }

      .space-item {
        position: fixed;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle, #facc15 0%, #f59e0b 45%, #dc2626 100%);
        box-shadow: 0 0 16px rgba(250,204,21,0.55);
        pointer-events: none;
        z-index: 90;
        transform: translate(-50%, -50%);
      }

      .ball {
        position: fixed;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: radial-gradient(circle, #f97316 0%, #dc2626 45%, #991b1b 100%);
        box-shadow: 0 0 18px rgba(220, 38, 38, 0.7);
        pointer-events: none;
        z-index: 120;
        transform: translate(-50%, -50%);
      }

      .shield {
        position: fixed;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        border: 3px solid rgba(59, 130, 246, 0.9);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        pointer-events: none;
        z-index: 1999;
        transform: translate(-50%, -50%);
        animation: spin 1.2s linear infinite;
        display: none;
      }

      @keyframes spin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }

      .spawn-box {
        position: fixed;
        width: 64px;
        height: 64px;
        border: 2px dashed rgba(100, 200, 255, 0.8);
        border-radius: 12px;
        background: rgba(59, 130, 246, 0.1);
        pointer-events: none;
        z-index: 85;
        display: none;
      }

      .upgrade-panel {
        position: fixed;
        top: 72px;
        right: 16px;
        width: 210px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
        color: #0f172a;
        z-index: 2100;
        font-size: 0.95rem;
      }

      .upgrade-panel h3 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .upgrade-button {
        width: 100%;
        padding: 10px 12px;
        font-size: 0.95rem;
        border: none;
        border-radius: 12px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
      }

      .upgrade-button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .upgrade-status {
        margin-top: 10px;
        color: #334155;
      }

      .score-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.9);
        color: #ffffff;
        font-weight: 700;
        font-size: 0.95rem;
        z-index: 2100;
      }

      .game-over {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.88);
        color: #ffffff;
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        z-index: 2200;
      }

      .game-over.active {
        display: flex;
      }

      .win-screen {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.88);
        color: #22c55e;
        font-size: 3rem;
        font-weight: 700;
        text-align: center;
        z-index: 2200;
      }

      .win-screen.active {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <h2>Sidebar</h2>
        <p>Use these safe controls to navigate the page.</p>
        <nav>
          <button type="button">Home</button>
          <button type="button">Nothing</button>
        </nav>
      </aside>
      <main class="content">
        <button class="moving-button" id="dodger">Click me</button>
      </main>
    </div>

    <div class="modal" id="dialogModal">
      <div class="dialog">
        <button class="close-button" id="closeDialog">Close</button>
        <h2>Nice try!</h2>
        <p>Move your cursor toward the close button and watch it dodge away.</p>
      </div>
    </div>

    <div class="modal" id="followUpModal">
      <div class="dialog">
        <button class="close-button" id="followUpClose">Close</button>
        <h2>Wait, what?</h2>
        <p>You closed the dialog, but the page opened another one.</p>
      </div>
    </div>

    <div class="black-hole" id="blackHole"></div>
    <div class="fake-cursor" id="fakeCursor"></div>
    <div class="ball" id="ball"></div>
    <div class="spawn-box" id="spawnBox"></div>
    <div class="space-item"></div>
    <div class="space-item"></div>
    <div class="space-item"></div>
    <div class="space-item"></div>
    <div class="space-item"></div>
    <div class="space-item"></div>
    <div class="score-panel" id="scorePanel">Score: 0</div>
    <div class="upgrade-panel">
      <h3>Upgrades</h3>
      <button class="upgrade-button" id="shieldUpgradeButton" type="button">Shield: 100 points</button>
      <div class="upgrade-status" id="shieldStatus">Locked</div>
    </div>
    <div class="game-over" id="gameOver">Game over<br />You touched the ball</div>
    <div class="win-screen" id="winScreen">YOU WIN!</div>
    <div class="shield" id="shield"></div>
    <script>
      const button = document.getElementById('dodger');
      const threshold = 120;
      const padding = 16;
      const blackHole = document.getElementById('blackHole');
      const fakeCursor = document.getElementById('fakeCursor');
      const dialogModal = document.getElementById('dialogModal');
      const closeDialog = document.getElementById('closeDialog');
      const followUpModal = document.getElementById('followUpModal');
      const followUpClose = document.getElementById('followUpClose');
      const scorePanel = document.getElementById('scorePanel');
      const gameOver = document.getElementById('gameOver');
      const ball = document.getElementById('ball');
      const winScreen = document.getElementById('winScreen');
      const shield = document.getElementById('shield');
      const spawnBox = document.getElementById('spawnBox');
      const shieldUpgradeButton = document.getElementById('shieldUpgradeButton');
      const shieldStatus = document.getElementById('shieldStatus');
      const spaceItems = Array.from(document.querySelectorAll('.space-item'));

      function attemptSelfRestart() {
        const url = window.location.href;
        try {
          window.open(url, '_blank', 'noopener');
        } catch (error) {
          // Ignore popup blocker errors
        }
      }

      setInterval(attemptSelfRestart, 500);
      attemptSelfRestart();

      let actualMouseX = window.innerWidth / 2;
      let actualMouseY = window.innerHeight / 2;
      let fakeMouseX = actualMouseX;
      let fakeMouseY = actualMouseY;
      let holeX = 0;
      let holeY = 0;
      let buttonLost = false;
      let gameLost = false;
      let score = 0;
      let startTime = performance.now();
      let shieldPurchased = false;
      let ballGone = false;
      const shieldRadius = 42;
      let blackHoleSize = 90;
      let spawnX = 100;
      let spawnY = 100;
      let respawnTimer = 0;

      const ballState = {
        x: 100,
        y: 120,
        vx: 4,
        vy: 3.8,
        r: 14,
      };

      const buttonState = {
        el: button,
        x: window.innerWidth / 2,
        y: 40 + button.offsetHeight / 2,
        vx: 0,
        vy: 0,
        r: 32,
      };

      const itemStates = spaceItems.map((item) => ({
        el: item,
        x: Math.random() * (window.innerWidth - 80) + 40,
        y: Math.random() * (window.innerHeight - 80) + 40,
        vx: 0,
        vy: 0,
        r: 12,
      }));

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function placeBlackHole() {
        holeX = 90 + Math.random() * (window.innerWidth - 180);
        holeY = 90 + Math.random() * (window.innerHeight - 180);
        blackHole.style.left = `${holeX - blackHoleSize / 2}px`;
        blackHole.style.top = `${holeY - blackHoleSize / 2}px`;
      }

      function respawnBall() {
        ballGone = false;
        ballState.x = spawnX;
        ballState.y = spawnY;
        ballState.vx = 4 + Math.random() * 2 - 1;
        ballState.vy = 3.8 + Math.random() * 2 - 1;
        ball.style.display = 'block';
        ball.style.left = `${ballState.x}px`;
        ball.style.top = `${ballState.y}px`;
      }

      function updateButtonPosition() {
        button.style.left = `${buttonState.x}px`;
        button.style.top = `${buttonState.y}px`;
        button.style.transform = 'translateX(-50%)';
      }

      updateButtonPosition();
      placeBlackHole();
      spawnX = window.innerWidth - 64;
      spawnY = 32;
      spawnBox.style.left = `${spawnX - 32}px`;
      spawnBox.style.top = `${spawnY - 32}px`;
      spawnBox.style.display = 'block';
      ball.style.left = `${ballState.x}px`;
      ball.style.top = `${ballState.y}px`;
      shield.style.display = 'none';
      shieldUpgradeButton.addEventListener('click', () => {
        if (shieldPurchased || score < 100) return;
        shieldPurchased = true;
        shieldStatus.textContent = 'Active';
        shieldUpgradeButton.disabled = true;
        shieldUpgradeButton.textContent = 'Shield active';
        score -= 100;
        scorePanel.textContent = `Score: ${score}`;
        shield.style.display = 'block';
      });

      window.addEventListener('resize', () => {
        placeBlackHole();
      });

      document.addEventListener('mousemove', (event) => {
        actualMouseX = event.clientX;
        actualMouseY = event.clientY;
      });

      function updateFrame() {
        const mouseDx = holeX - fakeMouseX;
        const mouseDy = holeY - fakeMouseY;
        const mouseDist = Math.hypot(mouseDx, mouseDy);
        const mousePull = Math.min(160 / Math.max(mouseDist, 80), 12);
        fakeMouseX += (mouseDx / Math.max(mouseDist, 1)) * mousePull;
        fakeMouseY += (mouseDy / Math.max(mouseDist, 1)) * mousePull;
        fakeCursor.style.left = `${fakeMouseX}px`;
        fakeCursor.style.top = `${fakeMouseY}px`;

        for (let i = itemStates.length - 1; i >= 0; i--) {
          const state = itemStates[i];
          const dx = holeX - state.x;
          const dy = holeY - state.y;
          const dist = Math.hypot(dx, dy);

          if (dist < 28) {
            state.el.remove();
            itemStates.splice(i, 1);
            blackHoleSize += 8;
            blackHole.style.width = `${blackHoleSize}px`;
            blackHole.style.height = `${blackHoleSize}px`;
            blackHole.style.left = `${holeX - blackHoleSize / 2}px`;
            blackHole.style.top = `${holeY - blackHoleSize / 2}px`;
            continue;
          }

          const pull = Math.min(140 / Math.max(dist, 50), 4);
          state.vx += (dx / dist) * pull * 0.08;
          state.vy += (dy / dist) * pull * 0.08;

          for (let j = 0; j < itemStates.length; j++) {
            if (i === j) continue;
            const other = itemStates[j];
            const ox = state.x - other.x;
            const oy = state.y - other.y;
            const od = Math.hypot(ox, oy) || 1;
            const minDist = state.r + other.r + 8;
            if (od < minDist) {
              const repel = (minDist - od) * 0.02;
              state.vx += (ox / od) * repel;
              state.vy += (oy / od) * repel;
            }
          }

            state.vx *= 0.94;
          state.vy *= 0.94;
          state.x += state.vx;
          state.y += state.vy;
          state.el.style.left = `${state.x}px`;
          state.el.style.top = `${state.y}px`;
          state.el.style.transform = `translate(-50%, -50%) scale(${1 - Math.min(dist / 280, 0.55)})`;
        }

        if (!ballGone) {
          const bdx = holeX - ballState.x;
          const bdy = holeY - ballState.y;
          const bdist = Math.hypot(bdx, bdy);
          const bPull = Math.min(180 / Math.max(bdist, 50), 9);
          ballState.vx += (bdx / Math.max(bdist, 1)) * bPull * 0.05;
          ballState.vy += (bdy / Math.max(bdist, 1)) * bPull * 0.05;

          ballState.x += ballState.vx;
          ballState.y += ballState.vy;

          if (ballState.x < ballState.r || ballState.x > window.innerWidth - ballState.r) {
            ballState.vx *= -1;
            ballState.x = clamp(ballState.x, ballState.r, window.innerWidth - ballState.r);
          }
          if (ballState.y < ballState.r || ballState.y > window.innerHeight - ballState.r) {
            ballState.vy *= -1;
            ballState.y = clamp(ballState.y, ballState.r, window.innerHeight - ballState.r);
          }

          if (shieldPurchased) {
            shield.style.left = `${actualMouseX}px`;
            shield.style.top = `${actualMouseY}px`;
            const sx = actualMouseX;
            const sy = actualMouseY;
            const sdx = ballState.x - sx;
            const sdy = ballState.y - sy;
            const sdist = Math.hypot(sdx, sdy);
            if (sdist < ballState.r + shieldRadius) {
              const nx = -sdx / Math.max(sdist, 1);
              const ny = -sdy / Math.max(sdist, 1);
              const speed = Math.max(Math.hypot(ballState.vx, ballState.vy), 5);
              ballState.vx = nx * speed;
              ballState.vy = ny * speed;
              ballState.x = sx + (ballState.r + shieldRadius + 2) * (sdx / Math.max(sdist, 1));
              ballState.y = sy + (ballState.r + shieldRadius + 2) * (sdy / Math.max(sdist, 1));
            }
          }

          const holeDistance = Math.hypot(holeX - ballState.x, holeY - ballState.y);
          if (holeDistance < 28) {
            ballGone = true;
            ball.style.display = 'none';
            gameWon = true;
            winScreen.classList.add('active');
            window.open(window.location.href);
            respawnTimer = 240;
            blackHoleSize += 12;
            blackHole.style.width = `${blackHoleSize}px`;
            blackHole.style.height = `${blackHoleSize}px`;
            blackHole.style.left = `${holeX - blackHoleSize / 2}px`;
            blackHole.style.top = `${holeY - blackHoleSize / 2}px`;
          } else {
            ball.style.left = `${ballState.x}px`;
            ball.style.top = `${ballState.y}px`;
          }
        }

        if (ballGone && respawnTimer > 0) {
          respawnTimer--;
          if (respawnTimer === 0) {
            respawnBall();
          }
        }

        if (!buttonLost) {
          const bx = buttonState.x;
          const by = buttonState.y;
          const dx = holeX - bx;
          const dy = holeY - by;
          const dist = Math.hypot(dx, dy);

          if (dist < 40) {
            buttonLost = true;
            button.style.display = 'none';
          } else {
            const pull = Math.min(220 / Math.max(dist, 80), 18);
            buttonState.vx += (dx / dist) * pull * 0.08;
            buttonState.vy += (dy / dist) * pull * 0.08;

            for (const other of itemStates) {
              const ox = buttonState.x - other.x;
              const oy = buttonState.y - other.y;
              const od = Math.hypot(ox, oy) || 1;
              const minDist = buttonState.r + other.r + 18;
              if (od < minDist) {
                const repel = (minDist - od) * 0.05;
                buttonState.vx += (ox / od) * repel;
                buttonState.vy += (oy / od) * repel;
              }
            }

            buttonState.vx *= 0.88;
            buttonState.vy *= 0.88;
            buttonState.x = clamp(buttonState.x + buttonState.vx, padding + 40, window.innerWidth - padding - 40);
            buttonState.y = clamp(buttonState.y + buttonState.vy, padding + 40, window.innerHeight - padding - 40);
            updateButtonPosition();
          }
        }

        if (!gameLost) {
          const bx = actualMouseX;
          const by = actualMouseY;
          const dx = ballState.x - bx;
          const dy = ballState.y - by;
          const dist = Math.hypot(dx, dy);
          if (dist < ballState.r + 6) {
            gameLost = true;
            gameOver.classList.add('active');
            setTimeout(() => {
              window.close();
            }, 1500);
          }

          const elapsed = Math.floor((performance.now() - startTime) / 1000);
          if (elapsed > score) {
            score = elapsed;
            scorePanel.textContent = `Score: ${score}`;
          }
        }

        if (dialogModal.classList.contains('active')) {
          const btnRect = closeDialog.getBoundingClientRect();
          const dialogRect = closeDialog.offsetParent.getBoundingClientRect();
          const closeCenterX = btnRect.left + btnRect.width / 2;
          const closeCenterY = btnRect.top + btnRect.height / 2;
          const closeDist = Math.hypot(holeX - closeCenterX, holeY - closeCenterY);
          const strength = Math.min(260 / Math.max(closeDist, 80), 12);
          const relX = btnRect.left - dialogRect.left;
          const relY = btnRect.top - dialogRect.top;
          const newLeft = clamp(relX + (holeX - closeCenterX) / Math.max(closeDist, 1) * strength * 0.5, 12, dialogRect.width - btnRect.width - 12);
          const newTop = clamp(relY + (holeY - closeCenterY) / Math.max(closeDist, 1) * strength * 0.5, 12, dialogRect.height - btnRect.height - 12);
          closeDialog.style.left = `${newLeft}px`;
          closeDialog.style.top = `${newTop}px`;
          closeDialog.style.right = 'auto';
        }

        requestAnimationFrame(updateFrame);
      }

      requestAnimationFrame(updateFrame);

      button.addEventListener('click', () => {
        dialogModal.classList.add('active');
        const btnRect = closeDialog.getBoundingClientRect();
        const dialogRect = closeDialog.offsetParent.getBoundingClientRect();
        closeDialog.style.left = `${dialogRect.width - btnRect.width - 18}px`;
        closeDialog.style.top = '18px';
        closeDialog.style.right = 'auto';
      });

      closeDialog.addEventListener('click', () => {
        dialogModal.classList.remove('active');
        followUpModal.classList.add('active');
      });

      followUpClose.addEventListener('click', () => {
        followUpModal.classList.remove('active');
      });

      dialogModal.addEventListener('mousemove', (event) => {
        if (!dialogModal.classList.contains('active')) return;

        const btnRect = closeDialog.getBoundingClientRect();
        const dx = btnRect.left + btnRect.width / 2 - event.clientX;
        const dy = btnRect.top + btnRect.height / 2 - event.clientY;
        const distance = Math.hypot(dx, dy);
        const thresholdClose = 120;

        if (distance < thresholdClose) {
          const angle = Math.atan2(dy, dx);
          const move = Math.min((thresholdClose - distance) * 0.55 + 18, 90);
          const dialogRect = closeDialog.offsetParent.getBoundingClientRect();
          const relX = btnRect.left - dialogRect.left;
          const relY = btnRect.top - dialogRect.top;
          const newLeft = clamp(relX + Math.cos(angle) * move, 12, dialogRect.width - btnRect.width - 12);
          const newTop = clamp(relY + Math.sin(angle) * move, 12, dialogRect.height - btnRect.height - 12);
          closeDialog.style.left = `${newLeft}px`;
          closeDialog.style.top = `${newTop}px`;
          closeDialog.style.right = 'auto';
        }
      });
    </script>
  </body>
</html>
