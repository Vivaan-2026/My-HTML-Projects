<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A well read document(maybe well written too)</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f0f4ff;
      }

      .page {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 220px;
        background: #1f2937;
        color: #f8fafc;
        padding: 20px 0;
        box-shadow: 2px 0 18px rgba(15, 23, 42, 0.16);
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.4rem;
        padding: 0 18px;
      }

      .sidebar p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 16px 0 24px;
        padding: 0 18px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
      }

      .sidebar nav button {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #334155;
        color: #cbd5e1;
        text-align: left;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .sidebar nav button:hover,
      .sidebar nav button:focus {
        background: #475569;
        color: #ffffff;
        outline: none;
      }

      .content {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      .content h1 {
        margin: 0;
        font-size: 2rem;
        color: #1f2937;
      }

      .content p {
        max-width: 720px;
        margin: 16px 0 0;
        line-height: 1.7;
        color: #334155;
      }

      .moving-button {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        background: #0078d4;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: left 0.16s ease, top 0.16s ease;
        will-change: left, top;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.72);
        z-index: 1000;
        padding: 20px;
      }

      .modal.active {
        display: flex;
      }

      .dialog {
        position: relative;
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 22px;
        background: #ffffff;
        color: #102a43;
        box-shadow: 0 24px 60px rgba(12, 29, 56, 0.18);
      }

      .dialog h2 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 1.7rem;
      }

      .dialog p {
        margin: 0;
        line-height: 1.6;
        color: #334155;
      }

      .close-button {
        position: absolute;
        top: 18px;
        right: 18px;
        padding: 10px 16px;
        border: none;
        border-radius: 999px;
        background: #ef4444;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, top 0.15s ease, left 0.15s ease;
      }

      .close-button:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <h2>Sidebar</h2>
        <p>Use these safe controls to navigate the page.</p>
        <nav>
          <button type="button">Home</button>
          <button type="button">Nothing</button>
        </nav>
      </aside>
      <main class="content">
        <button class="moving-button" id="dodger">Click me</button>
        <h1>Welcome back</h1>
        <p>This page has been cleaned and restored. The sidebar is intact, and the markup now validates properly.</p>
      </main>
    </div>

    <div class="modal" id="dialogModal">
      <div class="dialog">
        <button class="close-button" id="closeDialog">Close</button>
        <h2>Nice try!</h2>
        <p>Move your cursor toward the close button and watch it dodge away.</p>
      </div>
    </div>
    <script>
      const button = document.getElementById('dodger');
      const threshold = 120;
      const padding = 16;

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      const dialogModal = document.getElementById('dialogModal');
      const closeDialog = document.getElementById('closeDialog');

      document.addEventListener('mousemove', (event) => {
        const rect = button.getBoundingClientRect();
        const btnX = rect.left + rect.width / 2;
        const btnY = rect.top + rect.height / 2;
        const dx = btnX - event.clientX;
        const dy = btnY - event.clientY;
        const distance = Math.hypot(dx, dy);

        if (distance < threshold) {
          const angle = Math.atan2(dy, dx);
          const move = Math.min((threshold - distance) * 0.45 + 8, 32);
          const newLeft = clamp(rect.left + Math.cos(angle) * move, padding, window.innerWidth - rect.width - padding);
          const newTop = clamp(rect.top + Math.sin(angle) * move, padding, window.innerHeight - rect.height - padding);
          button.style.left = `${newLeft}px`;
          button.style.top = `${newTop}px`;
          button.style.transform = 'translateX(-50%)';
        }
      });

      button.addEventListener('click', () => {
        dialogModal.classList.add('active');
      });

      closeDialog.addEventListener('click', () => {
        dialogModal.classList.remove('active');
      });

      dialogModal.addEventListener('mousemove', (event) => {
        if (!dialogModal.classList.contains('active')) return;

        const btnRect = closeDialog.getBoundingClientRect();
        const dialogRect = closeDialog.offsetParent.getBoundingClientRect();
        const dx = btnRect.left + btnRect.width / 2 - event.clientX;
        const dy = btnRect.top + btnRect.height / 2 - event.clientY;
        const distance = Math.hypot(dx, dy);
        const thresholdClose = 120;

        if (distance < thresholdClose) {
          const angle = Math.atan2(dy, dx);
          const move = Math.min((thresholdClose - distance) * 0.55 + 18, 90);
          const relX = btnRect.left - dialogRect.left;
          const relY = btnRect.top - dialogRect.top;
          const newLeft = clamp(relX + Math.cos(angle) * move, 12, dialogRect.width - btnRect.width - 12);
          const newTop = clamp(relY + Math.sin(angle) * move, 12, dialogRect.height - btnRect.height - 12);

          closeDialog.style.left = `${newLeft}px`;
          closeDialog.style.top = `${newTop}px`;
          closeDialog.style.right = 'auto';
        }
      });
    </script>
  </body>
</html>
