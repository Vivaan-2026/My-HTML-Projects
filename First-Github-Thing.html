<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A well read document(maybe well written too)</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f0f4ff;
      }

      .page {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 220px;
        background: #1f2937;
        color: #f8fafc;
        padding: 20px 0;
        box-shadow: 2px 0 18px rgba(15, 23, 42, 0.16);
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.4rem;
        padding: 0 18px;
      }

      .sidebar p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 16px 0 24px;
        padding: 0 18px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
      }

      .sidebar nav button {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #334155;
        color: #cbd5e1;
        text-align: left;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .sidebar nav button:hover,
      .sidebar nav button:focus {
        background: #475569;
        color: #ffffff;
        outline: none;
      }

      .content {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      .content h1 {
        margin: 0;
        font-size: 2rem;
        color: #1f2937;
      }

      .content p {
        max-width: 720px;
        margin: 16px 0 0;
        line-height: 1.7;
        color: #334155;
      }

      .moving-button {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        background: #0078d4;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <h2>Sidebar</h2>
        <p>Use these safe controls to navigate the page.</p>
        <nav>
          <button type="button">The most annoying website evr</button>
          <button type="button">Home</button>
          <button type="button">About</button>
          <button type="button">The most annoying website evr</button>
        </nav>
      </aside>
      <main class="content">
        <button class="moving-button" id="dodger">Click me</button>
        <h1>Welcome back</h1>
        <p>This page has been cleaned and restored. The sidebar is intact, and the markup now validates properly.</p>
      </main>
    </div>
    <script>
      const button = document.getElementById('dodger');
      const threshold = 120;
      const padding = 16;

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      document.addEventListener('mousemove', (event) => {
        const rect = button.getBoundingClientRect();
        const btnX = rect.left + rect.width / 2;
        const btnY = rect.top + rect.height / 2;
        const dx = btnX - event.clientX;
        const dy = btnY - event.clientY;
        const distance = Math.hypot(dx, dy);

        if (distance < threshold) {
          const angle = Math.atan2(dy, dx);
          const move = threshold - distance + 10;
          const newLeft = clamp(rect.left + Math.cos(angle) * move, padding, window.innerWidth - rect.width - padding);
          const newTop = clamp(rect.top + Math.sin(angle) * move, padding, window.innerHeight - rect.height - padding);
          button.style.left = `${newLeft}px`;
          button.style.top = `${newTop}px`;
          button.style.transform = 'translate(0, 0)';
        }
      });
    </script>
  </body>
</html>
