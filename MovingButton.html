<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moving Button Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #f8fafc, #dbeafe);
        font-family: Arial, sans-serif;
      }
      .wrapper {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      .avoid-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
      .hint {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        color: #334155;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="hint">Move the mouse closer and the button will run away.</div>
      <button class="avoid-button" id="avoidButton">Catch me</button>
    </div>
    <script>
      const button = document.getElementById('avoidButton');
      const padding = 18;
      const safeDistance = 140;
      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let currentX = targetX;
      let currentY = targetY;
      const smoothing = 0.16;

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function updateButtonPosition() {
        currentX += (targetX - currentX) * smoothing;
        currentY += (targetY - currentY) * smoothing;
        button.style.left = `${currentX}px`;
        button.style.top = `${currentY}px`;
        requestAnimationFrame(updateButtonPosition);
      }

      function moveButtonAway(event) {
        const rect = button.getBoundingClientRect();
        const mouseX = event.clientX;
        const mouseY = event.clientY;
        const buttonX = rect.left + rect.width / 2;
        const buttonY = rect.top + rect.height / 2;
        const dx = buttonX - mouseX;
        const dy = buttonY - mouseY;
        const distance = Math.hypot(dx, dy);

        if (distance < safeDistance) {
          const angle = Math.atan2(dy, dx);
          const moveAmount = safeDistance - distance + 24;
          targetX = clamp(
            buttonX + Math.cos(angle) * moveAmount - rect.width / 2,
            padding,
            window.innerWidth - rect.width - padding
          );
          targetY = clamp(
            buttonY + Math.sin(angle) * moveAmount - rect.height / 2,
            padding,
            window.innerHeight - rect.height - padding
          );
          button.style.background = '#1d4ed8';
        } else {
          button.style.background = '#2563eb';
        }
      }

      updateButtonPosition();
      window.addEventListener('mousemove', moveButtonAway);
    </script>
  </body>
</html>
